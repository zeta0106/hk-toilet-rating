*{margin:0;padding:0;box-sizing:border-box}
:root{

html{scroll-behavior:smooth}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{text-decoration:none;color:var(--primary)}

.nav-logo{font-size:1.35em;font-weight:700;color:var(--primary);cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none}

.nav-buttons{display:flex;gap:8px}
.nav-btn{padding:7px 18px;border:2px solid var(--primary);background:0 0;color:var(--primary);font-size:.9em;font-weight:600;border-radius:24px;cursor:pointer;transition:.2s;font-family:inherit}

.main{margin-top:var(--nav-h);min-height:calc(100vh - var(--nav-h) - 56px);padding-bottom:30px}

.hero{text-align:center;padding:36px 20px 10px}
.hero h1{font-size:2.1em;font-weight:900;margin-bottom:6px}
.hero p{font-size:1.05em;color:var(--text2);max-width:520px;margin:0 auto}

.map-section{max-width:880px;margin:18px auto;padding:0 16px}
.map-box{position:relative;width:100%;padding-bottom:62%;border-radius:var(--radius);box-shadow:var(--shadow-lg);overflow:hidden;background:#dbeeff}
.map-box svg{position:absolute;top:0;left:0;width:100%;height:100%}
.map-marker{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:10;transition:.25s;text-align:center}
.map-marker:hover{transform:translate(-50%,-50%) scale(1.18);z-index:20}
.map-marker.dim{opacity:.2;pointer-events:none}
.marker-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.65em;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.3);margin:0 auto 3px;transition:.25s}
.marker-label{font-size:.78em;font-weight:600;color:var(--text);text-shadow:1px 1px 2px rgba(255,255,255,.9);white-space:nowrap}

.breadcrumb{font-size:.88em;color:var(--text2);margin-bottom:16px}

.page-wrap{max-width:920px;margin:0 auto;padding:28px 20px}
.page-wrap h1{font-size:1.9em;font-weight:800;margin-bottom:4px}
.page-wrap .subtitle{color:var(--text2);margin-bottom:24px;font-size:.95em}
.map-embed{width:100%;height:360px;border:0;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:28px}
.section-title{font-size:1.15em;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--primary)}
.toilet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;margin-bottom:30px}
.toilet-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;cursor:pointer;transition:.25s;border-left:5px solid}
.toilet-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px)}
.type-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.78em;font-weight:600;margin-bottom:6px}

.type-badge.public{background:#fff3e0;color:#e65100}
.type-badge.airport{background:#e3f2fd;color:#1565c0}
.toilet-card h3{font-size:1.05em;margin-bottom:10px}
.score-row{display:flex;align-items:center;gap:10px}
.score-big{font-size:1.7em;font-weight:800;line-height:1}
.score-bar-wrap{flex:1}

.score-fill{height:100%;border-radius:4px;transition:width .6s}

.toilet-header{margin-bottom:24px}

.total-score-circle .num{font-size:2em;line-height:1}
.total-score-circle .den{font-size:.8em;opacity:.85}
.total-desc{text-align:left}
.total-desc .label{font-size:1.3em;font-weight:700;margin-bottom:2px}
.total-desc .sub{font-size:.9em;color:var(--text2)}
.content-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px}
.rating-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}

/* ===== HELPER FUNCTIONS ===== */
function getDistrict(id){return DISTRICTS.find(d=>d.id===id)}
function totalScore(ratings){return ratings.reduce((a,b)=>a+b,0)}

function getToiletScore(t){
  if(t.ratings) return totalScore(t.ratings);
  if(t.male && t.female){
    const m = totalScore(t.male.ratings);
    const f = totalScore(t.female.ratings);
    return Math.round(((m+f)/2)*10)/10;
  }
  return 0;
}

function isMerged(t){return !t.ratings && t.male && t.female}

function scoreColor(s,max){
  const p=s/max;
  if(p>=.8)return'#1b8a2d';if(p>=.6)return'#34a853';if(p>=.4)return'#fbbc04';return'#ea4335';
}
function scoreLabel(s){
  if(s>=9)return'優秀';if(s>=7)return'良好';if(s>=4)return'一般';return'差';
}
function cellColor(v){return v>=1.5?'#34a853':v>=1?'#fb8c00':'#ea4335'}
function typeLabel(t){return t==='mall'?'商場':t==='airport'?'機場':'公廁'}

/* ===== 用戶評分功能 ===== */
function getRatingKey(districtId, toiletId){
  return districtId + '_' + toiletId;
}

function hasRated(key){
  try{
    const rated = JSON.parse(localStorage.getItem('hk_toilet_user_ratings') || '{}');
    return rated[key] || false;
  } catch(e){ return false }
}

function markRated(key, score){
  try{
    const rated = JSON.parse(localStorage.getItem('hk_toilet_user_ratings') || '{}');
    rated[key] = score;
    localStorage.setItem('hk_toilet_user_ratings', JSON.stringify(rated));
  } catch(e){}
}

async function submitRating(key, score, comment){
  const data = {
    toiletKey: key,
    score: score,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  };
  if(comment && comment.trim() !== ''){
    data.comment = comment.trim();
  }
  await db.collection('ratings').add(data);
  markRated(key, score);
}

async function getAverageRating(key){
  const snapshot = await db.collection('ratings').where('toiletKey','==',key).get();
  if(snapshot.empty) return { avg:0, count:0 };
  let total = 0;
  snapshot.forEach(doc => { total += doc.data().score; });
  return { avg: Math.round((total / snapshot.size) * 10) / 10, count: snapshot.size };
}

async function loadComments(districtId, toiletId){
  const key = getRatingKey(districtId, toiletId);
  const commentsEl = document.getElementById('comments-list-' + toiletId);
  if(!commentsEl) return;

  try {
    const snapshot = await db.collection('ratings')
      .where('toiletKey', '==', key)
      .orderBy('timestamp', 'desc')
      .limit(30)
      .get();

    if(snapshot.empty){
      commentsEl.innerHTML = '<p style="color:var(--text2);text-align:center;padding:20px">暫時未有用戶評論，做第一個評論嘅人！</p>';
      return;
    }

    let html = '';
    snapshot.forEach(doc => {
      const data = doc.data();
      const starsHtml = [1,2,3,4,5].map(i =>
        '<span style="color:' + (i <= data.score ? '#fbbc04' : '#ddd') + '">★</span>'
      ).join('');
      const comment = data.comment || '';
      const time = data.timestamp ? data.timestamp.toDate().toLocaleDateString('zh-HK') : '';
      const safeComment = comment.replace(/</g,'&lt;').replace(/>/g,'&gt;');

      html += `<div class="comment-item">
        <div class="comment-avatar">👤</div>
        <div class="comment-body">
          <div class="comment-meta">
            <span class="comment-stars">${starsHtml}</span>
            <span class="comment-time">${time}</span>
          </div>
          ${safeComment
            ? '<p class="comment-text">' + safeComment + '</p>'
            : '<p class="comment-text empty">（只評分，未留評論）</p>'}
        </div>
      </div>`;
    });

    commentsEl.innerHTML = html;
  } catch(e) {
    // 如果索引未建立，嘗試不排序
    try {
      const snapshot = await db.collection('ratings')
        .where('toiletKey', '==', key)
        .get();

      if(snapshot.empty){
        commentsEl.innerHTML = '<p style="color:var(--text2);text-align:center;padding:20px">暫時未有用戶評論，做第一個評論嘅人！</p>';
        return;
      }

      let items = [];
      snapshot.forEach(doc => { items.push(doc.data()); });
      items.sort((a,b) => {
        const ta = a.timestamp ? a.timestamp.toDate().getTime() : 0;
        const tb = b.timestamp ? b.timestamp.toDate().getTime() : 0;
        return tb - ta;
      });

      let html = '';
      items.slice(0, 30).forEach(data => {
        const starsHtml = [1,2,3,4,5].map(i =>
          '<span style="color:' + (i <= data.score ? '#fbbc04' : '#ddd') + '">★</span>'
        ).join('');
        const comment = data.comment || '';
        const time = data.timestamp ? data.timestamp.toDate().toLocaleDateString('zh-HK') : '';
        const safeComment = comment.replace(/</g,'&lt;').replace(/>/g,'&gt;');

        html += `<div class="comment-item">
          <div class="comment-avatar">👤</div>
          <div class="comment-body">
            <div class="comment-meta">
              <span class="comment-stars">${starsHtml}</span>
              <span class="comment-time">${time}</span>
            </div>
            ${safeComment
              ? '<p class="comment-text">' + safeComment + '</p>'
              : '<p class="comment-text empty">（只評分，未留評論）</p>'}
          </div>
        </div>`;
      });

      commentsEl.innerHTML = html;
    } catch(e2) {
      commentsEl.innerHTML = '<p style="color:var(--accent);text-align:center;padding:20px">無法載入評論</p>';
    }
  }
}

async function loadRatingDisplay(districtId, toiletId){
  const key = getRatingKey(districtId, toiletId);
  const avgEl = document.getElementById('rating-avg-' + toiletId);
  if(!avgEl) return;

  const prev = hasRated(key);
  if(prev) showRated(toiletId, prev);

  try{
    const { avg, count } = await getAverageRating(key);
    if(count === 0){
      avgEl.innerHTML = '暫時未有用戶評分，做第一個評分嘅人！';
    } else {
      const starsHtml = [1,2,3,4,5].map(i =>
        '<span style="color:' + (i <= Math.round(avg) ? '#fbbc04' : '#ddd') + '">★</span>'
      ).join('');
      avgEl.innerHTML = starsHtml + ' <span class="avg-num">' + avg + '</span> / 5（共 ' + count + ' 個評分）';
    }
  } catch(e){
    avgEl.innerHTML = '無法載入用戶評分';
  }

  // 載入評論列表
  loadComments(districtId, toiletId);
}

function showRated(toiletId, score){
  const stars = document.querySelectorAll('#stars-' + toiletId + ' .star');
  stars.forEach(s => {
    if(parseInt(s.dataset.score) <= score) s.classList.add('active');
    s.style.pointerEvents = 'none';
  });
  // 隱藏評論輸入框
  const commentBox = document.getElementById('comment-box-' + toiletId);
  if(commentBox) commentBox.style.display = 'none';

  const msgEl = document.getElementById('rating-msg-' + toiletId);
  if(msgEl) msgEl.innerHTML = '<div class="rating-submitted">✅ 多謝你嘅評分！</div>';
}

async function handleRate(districtId, toiletId, score){
  const key = getRatingKey(districtId, toiletId);
  if(hasRated(key)) return;

  // 取得評論內容
  const commentEl = document.getElementById('comment-' + toiletId);
  const comment = commentEl ? commentEl.value : '';

  const msgEl = document.getElementById('rating-msg-' + toiletId);
  try{
    await submitRating(key, score, comment);
    showRated(toiletId, score);
    loadRatingDisplay(districtId, toiletId);
  } catch(e){
    if(msgEl) msgEl.innerHTML = '<div style="color:var(--accent)">提交失敗，請稍後再試</div>';
  }
}

document.addEventListener('mouseover', function(e){
  const star = e.target;
  if(!star.classList.contains('star') || !star.closest('.star-rating')) return;
  const container = star.closest('.star-rating');
  const dId = container.dataset.district;
  const tId = container.id.replace('stars-','');
  if(hasRated(getRatingKey(dId, tId))) return;
  const score = parseInt(star.dataset.score);
  container.querySelectorAll('.star').forEach(s => {
    s.classList.toggle('hovered', parseInt(s.dataset.score) <= score);
  });
});
document.addEventListener('mouseout', function(e){
  const star = e.target;
  if(!star.classList.contains('star') || !star.closest('.star-rating')) return;
  star.closest('.star-rating').querySelectorAll('.star').forEach(s => s.classList.remove('hovered'));
});

/* ===== RENDER DISTRICT ===== */
function renderDistrict(districtId){
  const d = getDistrict(districtId);
  if(!d) return '<div class="page-wrap"><h1>找不到此地區</h1></div>';

  const malls = d.toilets.filter(t=>t.type==='mall'||t.type==='airport');
  const publics = d.toilets.filter(t=>t.type==='public');

  function cardHtml(t){
    const s = getToiletScore(t);
    const c = scoreColor(s,10);
    const merged = isMerged(t);
    const genderNote = merged ? '<div style="font-size:.75em;color:var(--text2);margin-top:4px">🚹🚺 男女廁綜合評分</div>' : '';
    return `<div class="toilet-card" style="border-left-color:${c}" onclick="navigate('#toilet/${d.id}/${t.id}')">
      <span class="type-badge ${t.type}">${typeLabel(t.type)}</span>
      <h3>${t.name}</h3>
      <div class="score-row">
        <span class="score-big" style="color:${c}">${s}</span>
        <div class="score-bar-wrap">
          <div class="score-bar"><div class="score-fill" style="width:${s*10}%;background:${c}"></div></div>
          <div class="score-label">${scoreLabel(s)} · 滿分10分</div>
        </div>
      </div>
      ${genderNote}
    </div>`;
  }

  const mapSrc = `https://www.google.com/maps?q=${d.lat},${d.lng}&z=${d.zoom}&output=embed&hl=zh-TW`;

  let html = `<div class="page-wrap">
    <div class="breadcrumb"><a href="#home">首頁</a><span>›</span>${d.name}</div>
    <h1 style="color:${d.color}">${d.name}</h1>
    <p class="subtitle">共 ${d.toilets.length} 個廁所評級（${malls.length} 商場 · ${publics.length} 公廁）</p>
    <iframe class="map-embed" src="${mapSrc}" allowfullscreen loading="lazy"></iframe>`;

  if(malls.length){
    html += `<div class="section-title">🏬 商場廁所</div><div class="toilet-grid">${malls.map(cardHtml).join('')}</div>`;
  }
  if(publics.length){
    html += `<div class="section-title">🚻 公共廁所</div><div class="toilet-grid">${publics.map(cardHtml).join('')}</div>`;
  }
  html += '</div>';
  return html;
}

/* ===== BUILD RATING TABLE + PHOTOS ===== */
function buildRatingTable(ratings){
  let rows = CRITERIA.map((cr,i)=>{
    const v = ratings[i];
    const cc = cellColor(v);
    const descIndex = Math.round(v);
    return `<tr>
      <td class="crit-name">${cr}</td>
      <td class="desc-cell">${CRITERIA_DESC[i][descIndex]}</td>
      <td class="score-cell" style="color:${cc}">${v} / 2</td>
    </tr>`;
  }).join('');

  const s = totalScore(ratings);
  const c = scoreColor(s,10);

  return `<table class="rating-table">
    <thead><tr><th>指標</th><th>描述</th><th>分數</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td colspan="2" style="font-weight:700;padding:12px 14px">總分</td><td class="score-cell" style="color:${c};font-size:1.2em">${s} / 10</td></tr></tfoot>
  </table>`;
}

function buildPhotos(images){
  return images.map(img => `
    <div class="photo-item">
      <img src="${img.src}" alt="${img.label}" style="width:100%; border-radius:8px;">
      <p style="text-align:center; margin-top:4px;">${img.label}</p>
    </div>
  `).join('');
}

function renderToilet(districtId, toiletId){
  const d = getDistrict(districtId);
  if(!d) return '<div class="page-wrap"><h1>找不到此頁面</h1></div>';
  const t = d.toilets.find(x=>x.id===toiletId);
  if(!t) return '<div class="page-wrap"><h1>找不到此廁所</h1></div>';

  const s = getToiletScore(t);
  const c = scoreColor(s,10);
  const merged = isMerged(t);

  let contentHtml = '';

  if(merged){
    const ms = totalScore(t.male.ratings);
    const fs = totalScore(t.female.ratings);

    contentHtml = `
      <div class="gender-tabs">
        <button class="gender-tab male-tab active" onclick="switchGender('male',this)">🚹 男廁（${ms}分）</button>
        <button class="gender-tab female-tab" onclick="switchGender('female',this)">🚺 女廁（${fs}分）</button>
      </div>
      <div id="gender-male" class="gender-content active">
        <div class="content-grid">
          <div>
            <div class="section-title">📊 男廁詳細評分</div>
            ${buildRatingTable(t.male.ratings)}
          </div>
          <div>
            <div class="section-title">📸 男廁現場相片</div>
            <div class="photo-gallery">${buildPhotos(t.male.images)}</div>
          </div>
        </div>
      </div>
      <div id="gender-female" class="gender-content">
        <div class="content-grid">
          <div>
            <div class="section-title">📊 女廁詳細評分</div>
            ${buildRatingTable(t.female.ratings)}
          </div>
          <div>
            <div class="section-title">📸 女廁現場相片</div>
            <div class="photo-gallery">${buildPhotos(t.female.images)}</div>
          </div>
        </div>
      </div>`;
  } else {
    contentHtml = `
      <div class="content-grid">
        <div>
          <div class="section-title">📊 詳細評分</div>
          ${buildRatingTable(t.ratings)}
          <div style="margin-top:16px;text-align:center">
            <a href="#criteria" style="font-size:.85em;color:var(--primary)">📋 查看完整評分標準</a>
          </div>
        </div>
        <div>
          <div class="section-title">📸 現場相片</div>
          <div class="photo-gallery">${buildPhotos(t.images)}</div>
        </div>
      </div>`;
  }

  const escDId = d.id.replace(/'/g,"\\'");
  const escTId = t.id.replace(/'/g,"\\'");

  return `<div class="page-wrap">
    <div class="breadcrumb">
      <a href="#home">首頁</a><span>›</span>
      <a href="#district/${d.id}">${d.name}</a><span>›</span>
      ${t.name}
    </div>
    <div class="toilet-header">
      <h1>${t.name}<span class="type-badge ${t.type}" style="font-size:.55em;vertical-align:middle;margin-left:10px">${typeLabel(t.type)}</span></h1>
    </div>
    <div class="total-score-box">
      <div class="total-score-circle" style="background:${c}">
        <span class="num">${s}</span>
        <span class="den">/ 10</span>
      </div>
      <div class="total-desc">
        <div class="label" style="color:${c}">評級：${scoreLabel(s)}</div>
        <div class="sub">${merged ? '男女廁綜合平均分，根據5項指標評分，每項0-2分，滿分10分' : '根據5項指標評分，每項0-2分，滿分10分'}</div>
      </div>
    </div>
    ${contentHtml}
    <div style="margin-top:16px;text-align:center">
      <a href="#criteria" style="font-size:.85em;color:var(--primary)">📋 查看完整評分標準</a>
    </div>

    <!-- 用戶評分 -->
    <div class="user-rating-section">
      <h3>⭐ 用戶評分</h3>
      <p class="hint">你覺得呢個廁所點樣？（1-5星）</p>
      <div class="star-rating" id="stars-${t.id}" data-district="${d.id}">
        ${[1,2,3,4,5].map(i => '<span class="star" data-score="'+i+'" onclick="handleRate(\''+escDId+'\',\''+escTId+'\','+i+')">★</span>').join('')}
      </div>
      <div id="comment-box-${t.id}" style="margin-top:12px">
        <textarea id="comment-${t.id}" class="comment-textarea" placeholder="留低你嘅評論（選填）..." maxlength="300"></textarea>
        <p style="font-size:.78em;color:var(--text2);margin-top:4px">:bulb:撳完星星就可以提交評分同評論㗎啦！</p>
      </div>
      <div id="rating-msg-${t.id}"></div>
      <div id="rating-avg-${t.id}" class="rating-avg">載入用戶評分中...</div>
    </div>

    <!-- 用戶評論列表 -->
    <div class="comments-section">
      <div class="comments-header">💬 用戶評論</div>
      <div id="comments-list-${t.id}">
        <p style="color:var(--text2);text-align:center;padding:20px">載入評論中...</p>
      </div>
    </div>
  </div>`;
}

/* ===== GENDER TAB SWITCH ===== */
function switchGender(gender, btn){
  document.querySelectorAll('.gender-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.gender-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('gender-'+gender).classList.add('active');
}

/* ===== RENDER CRITERIA ===== */
function renderCriteria(){
  let rows = CRITERIA.map((cr,i)=>{
    return `<tr>
      <td>${cr}</td>
      <td style="color:#ea4335">${CRITERIA_DESC[i][0]}</td>
      <td style="color:#fb8c00">${CRITERIA_DESC[i][1]}</td>
      <td style="color:#34a853">${CRITERIA_DESC[i][2]}</td>
    </tr>`;
  }).join('');

  return `<div class="page-wrap">
    <div class="breadcrumb"><a href="#home">首頁</a><span>›</span>評分標準</div>
    <h1>📋 評分標準</h1>
    <p class="subtitle">每項指標以 0-2 分評級，5項共10分滿分</p>
    <table class="criteria-table">
      <thead><tr><th>指標</th><th>0分</th><th>1分</th><th>2分</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:30px;padding:20px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow)">
      <h3 style="margin-bottom:10px">📊 總分評級對照</h3>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;text-align:center">
        <div style="padding:14px;background:#fce4ec;border-radius:8px"><div style="font-size:1.4em;font-weight:800;color:#ea4335">0-3</div><div style="font-weight:600;color:#c62828">差</div></div>
        <div style="padding:14px;background:#fff8e1;border-radius:8px"><div style="font-size:1.4em;font-weight:800;color:#fb8c00">4-6</div><div style="font-weight:600;color:#e65100">一般</div></div>
        <div style="padding:14px;background:#e8f5e9;border-radius:8px"><div style="font-size:1.4em;font-weight:800;color:#34a853">7-8</div><div style="font-weight:600;color:#2e7d32">良好</div></div>
        <div style="padding:14px;background:#c8e6c9;border-radius:8px"><div style="font-size:1.4em;font-weight:800;color:#1b8a2d">9-10</div><div style="font-weight:600;color:#1b5e20">優秀</div></div>
      </div>
    </div>
  </div>`;
}

/* ===== NAVIGATION ===== */
let currentRegionFilter = null;

function navigate(hash){
  window.location.hash = hash;
}

function filterRegion(region, btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(currentRegionFilter === region){
    currentRegionFilter = null;
  } else {
    currentRegionFilter = region;
    if(btn) btn.classList.add('active');
  }
  if(!window.location.hash || window.location.hash==='#home'){
    render();
  } else {
    window.location.hash = '#home';
  }
}

function render(){
  const hash = window.location.hash || '#home';
  const parts = hash.replace('#','').split('/');
  const app = document.getElementById('app');

  let html = '';
  switch(parts[0]){
    case 'home':
    case '':
      html = renderHome(currentRegionFilter);
      break;
    case 'district':
      html = renderDistrict(parts[1]);
      currentRegionFilter = null;
      document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
      break;
    case 'toilet':
      html = renderToilet(parts[1], parts[2]);
      currentRegionFilter = null;
      document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
      break;
    case 'criteria':
      html = renderCriteria();
      break;
    default:
      html = renderHome(currentRegionFilter);
  }
  app.innerHTML = html;
  window.scrollTo(0,0);

  // 載入用戶評分及評論
  if(parts[0]==='toilet' && parts[1] && parts[2]){
    loadRatingDisplay(parts[1], parts[2]);
  }
}

window.addEventListener('hashchange', render);
window.addEventListener('load', render);
</script>
